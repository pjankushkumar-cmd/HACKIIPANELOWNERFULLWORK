<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>VIP UID Verification</title>
</head>
<body>
    <div class="container">
        <h1 class="hack-title" style="font-size: 24px; color: #ffcc00; text-shadow: 0 0 15px #ffcc00;">👑 ACHA OR SAHI VIP PANEL 👑</h1>
        <h2 style="color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); margin-top: 5px;">FULL VIP OWNER PANEL</h2>
        
        <!-- Registration Redirect Section -->
        <div style="background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(0, 229, 255, 0.2);">
            <p style="font-size: 14px; color: #fff; margin: 0 0 10px 0; font-weight: bold;">⚠️ If you haven't registered on JaiClub yet, do it now:</p>
            <button onclick="window.location.href='https://www.jaiclub18.com/#/register?invitationCode=377572996558'" style="background: linear-gradient(90deg, #ff0055, #ff5500); animation: pulse 1.5s infinite;">🎯 REGISTER NOW (JAI CLUB)</button>
        </div>

        <p style="font-size: 14px; color: #aaa;">Enter your secret UID key to unlock the tool:</p>
        <input type="text" id="uidInput" placeholder="Paste UID Key Here...">
        <button onclick="verifyUID()">🚀 ACTIVATE PREDICTOR</button>
        
        <div id="msgBox" style="margin-top: 15px; font-size: 14px; font-weight: bold; min-height: 20px;"></div>
        
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 25px 0;">
        <p style="font-size: 13px; color: #ccc;">If you don't have access code or need extension, text admin directly:</p>
        <button class="btn-tg" onclick="window.location.href='https://t.me/hackii_sureshote'">💬 Message Telegram Admin</button>
    </div>

    <script>
        async function verifyUID() {
            const uid = document.getElementById('uidInput').value.trim();
            const msgBox = document.getElementById('msgBox');
            if(!uid) {
                msgBox.innerText = "Error: Please write UID code first!";
                msgBox.style.color = "#ff0055";
                return;
            }
            
            try {
                const res = await fetch('/api/user/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid })
                });
                const data = await res.json();
                
                if(data.status === 'approved') {
                    localStorage.setItem('user_uid', uid);
                    window.location.href = 'dashboard.html';
                } else {
                    msgBox.innerText = data.message;
                    msgBox.style.color = "#ff0055";
                }
            } catch (err) {
                msgBox.innerText = "Server Connection Error!";
                msgBox.style.color = "#ff0055";
            }
        }
    </script>
</body>
</html>
